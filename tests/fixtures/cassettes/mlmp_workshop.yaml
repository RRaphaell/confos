      string: "{\"notes\":[{\"content\":{\"title\":{\"value\":\"DoMiNO: Down-scaling
        Molecular Dynamics with Neural Graph Ordinary Differential Equations\"},\"authors\":{\"value\":[\"Fang
        Sun\",\"Zijie Huang\",\"Yadi Cao\",\"Xiao Luo\",\"Wei Wang\",\"Yizhou Sun\"]},\"authorids\":{\"value\":[\"~Fang_Sun3\",\"~Zijie_Huang1\",\"~Yadi_Cao1\",\"~Xiao_Luo3\",\"~Wei_Wang13\",\"~Yizhou_Sun1\"]},\"Track\":{\"value\":\"New
        scientific result\"},\"keywords\":{\"value\":[\"Multi-scale Modeling; Molecular
        Dynamics; Neural ODE\"]},\"abstract\":{\"value\":\"Molecular dynamics (MD)
        simulations are crucial for understanding and predicting the behavior of molecular
        systems in biology and chemistry. However, their wide adoption is hindered
        by two main challenges: (1) computational cost, because fine-grained simulations
        often require millions of small timesteps, and (2) lack of flexibility, as
        existing machine-learning-based surrogates typically operate at either a single
        small or single large timestep. These approaches either accumulate significant
        rollout errors or lose the ability to produce finegrained results if the timestep
        is large. To address these issues, we propose DoMiNO: Down-scaling Molecular
        Dynamics with Neural Graph Ordinary Differential Equations, a hierarchical
        framework that models multi-scale dynamics. Specifically, DoMiNO performs
        down-scaling by progressively up-sampling the trajectory across multiple temporal
        resolutions, equipping each level with a Neural Graph ODE to capture that
        scale's dominant behavior. At inference, DoMiNO flexibly combines different
        timestep sizes to predict both short- and longrange dynamics with high fidelity.
        Empirical results on challenging MD bench-marks-ranging from small molecules
        to proteins-demonstrate the method's longterm stability, flexibility, and
        accuracy. Our implementation is available at https://github.com/FrancoTSolis/domino-code.\"},\"pdf\":{\"value\":\"/pdf/498492aa93f1048352c80e4766fcfa49628f708d.pdf\"},\"Presenter\":{\"value\":\"~Yizhou_Sun1\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Oral\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nsun2025domino,\\ntitle={DoMi{NO}:
        Down-scaling Molecular Dynamics with Neural Graph Ordinary Differential Equations},\\nauthor={Fang
        Sun and Zijie Huang and Yadi Cao and Xiao Luo and Wei Wang and Yizhou Sun},\\nbooktitle={ICLR
        2025 Workshop on Machine Learning Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=T86jIuSi5A}\\n}\"},\"paperhash\":{\"value\":\"sun|domino_downscaling_molecular_dynamics_with_neural_graph_ordinary_differential_equations\"}},\"id\":\"T86jIuSi5A\",\"forum\":\"T86jIuSi5A\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission40/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission40/Authors\"],\"number\":40,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission40/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740560824665,\"cdate\":1740560824665,\"tmdate\":1744334591398,\"mdate\":1744334591398,\"pdate\":1741248197165,\"odate\":1741248197165},{\"content\":{\"title\":{\"value\":\"Towards
        Interpretable Structure Prediction With Sparse Autoencoders\"},\"authors\":{\"value\":[\"Nithin
        Parsan\",\"David J Yang\",\"John Jingxuan Yang\"]},\"authorids\":{\"value\":[\"~Nithin_Parsan1\",\"~David_J_Yang1\",\"~John_Jingxuan_Yang1\"]},\"Track\":{\"value\":\"Findings
        and open challenges\"},\"keywords\":{\"value\":[\"protein language models\",\"sparse
        autoencoders\",\"ESM2-3B\",\"ESMFold\",\"mechanistic interpretability\",\"Matryoshka
        architecture\",\"hierarchical features\",\"structure prediction\",\"contact
        map prediction\",\"model steering\",\"solvent accessibility\",\"biological
        concept discovery\",\"feature representation\",\"high-dimensional space\",\"linear
        representations\"]},\"TLDR\":{\"value\":\"We scale sparse autoencoders to
        ESM2-3B (ESMFold's base model) and introduce Matryoshka SAEs that learn multiscale
        hierarchical features, enabling interpretability and steering of protein structure
        predictions while maintaining performance.\"},\"abstract\":{\"value\":\"Protein
        language models have revolutionized structure prediction, but their nonlinear
        nature obscures how sequence representations inform structure prediction.
        While sparse autoencoders (SAEs) offer a path to interpretability here by
        learning linear representations in high-dimensional space, their application
        has been limited to smaller protein language models unable to perform structure
        prediction. In this work, we make two key advances: (1) we scale SAEs to ESM2-3B,
        the base model for ESMFold, enabling mechanistic interpretability of protein
        structure prediction for the first time, and (2) we adapt Matryoshka SAEs
        for protein language models, which learn hierarchically organized features
        by forcing nested groups of latents to reconstruct inputs independently. We
        demonstrate that our Matryoshka SAEs achieve comparable or better performance
        than standard architectures. Through comprehensive evaluations, we show that
        SAEs trained on ESM2-3B significantly outperform those trained on smaller
        models for both biological concept discovery and contact map prediction. Finally,
        we present an initial case study demonstrating how our approach enables targeted
        steering of ESMFold predictions, increasing structure solvent accessibility
        while fixing the input sequence. To facilitate further investigation by the
        broader community, we open-source our code, dataset, pretrained models, and
        visualizer.\"},\"pdf\":{\"value\":\"/pdf/e7ca447628fd5a5e7fc44b4f4bd8e5b83e155735.pdf\"},\"Presenter\":{\"value\":\"~John_Jingxuan_Yang1\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nparsan2025towards,\\ntitle={Towards
        Interpretable Structure Prediction With Multiscale Sparse Autoencoders},\\nauthor={Nithin
        Parsan and David J Yang and John Jingxuan Yang},\\nbooktitle={ICLR 2025 Workshop
        on Machine Learning Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=i8vGPXrDMa}\\n}\"},\"Supplementary\":{\"value\":\"https://github.com/johnyang101/reticular-sae\"},\"paperhash\":{\"value\":\"parsan|towards_interpretable_structure_prediction_with_sparse_autoencoders\"}},\"id\":\"i8vGPXrDMa\",\"forum\":\"i8vGPXrDMa\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission39/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission39/Authors\"],\"number\":39,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission39/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740530906784,\"cdate\":1740530906784,\"tmdate\":1744172570146,\"mdate\":1744172570146,\"pdate\":1741248197088,\"odate\":1741248197088},{\"content\":{\"title\":{\"value\":\"Physics-Transfer
        Learning: A Framework to Address the Accuracy-Performance Dilemma in Modeling
        Morphological Complexities in Brain Development\"},\"authors\":{\"value\":[\"Yingjie
        Zhao\",\"Zhiping Xu\"]},\"authorids\":{\"value\":[\"~Yingjie_Zhao2\",\"~Zhiping_Xu1\"]},\"Track\":{\"value\":\"Engineering\"},\"keywords\":{\"value\":[\"Physics-Transfer
        Learning; Accuracy-Performance Dilemma; Morphological Complexity; Brain Development;
        \ Digital libraries\"]},\"abstract\":{\"value\":\"The development of theoretical
        science follows an observation-assumption-model approach, effective for simple
        systems but hindered by complexity in engineering. Artificial intelligence
        (AI) and machine learning (ML) offer a data-driven alternative for making
        inferences when direct solutions are elusive. Feature engineering extends
        dimensional analysis, revealing hidden physics from data. We present a physics-transfer
        (PT) framework to predict physics across digitally varied models, addressing
        the accuracy-performance trade-off in multiscale challenges. This is exemplified
        in modeling brain morphology development, essential for disease diagnosis
        and prognosis. Nonlinear deformation physics from basic geometries is encoded
        into a neural network and applied to complex brain models. Results agree with
        longitudinal magnetic resonance imaging (MRI) data, and learned variables
        correlate with physical descriptors, such as undetectable stress states and
        submicroscopic characteristics, demonstrating the effectiveness of PT in understanding
        multiscale problems.\"},\"pdf\":{\"value\":\"/pdf/a775a107727c676aca749ffea589de5ae7dcb807.pdf\"},\"Presenter\":{\"value\":\"~Yingjie_Zhao2\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nzhao2025physicstransfer,\\ntitle={Physics-Transfer
        Learning: A Framework to Address the Accuracy-Performance Dilemma in Modeling
        Morphological Complexities in Brain Development},\\nauthor={Yingjie Zhao and
        Zhiping Xu},\\nbooktitle={ICLR 2025 Workshop on Machine Learning Multiscale
        Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=lRVhXYoKQ7}\\n}\"},\"paperhash\":{\"value\":\"zhao|physicstransfer_learning_a_framework_to_address_the_accuracyperformance_dilemma_in_modeling_morphological_complexities_in_brain_development\"}},\"id\":\"lRVhXYoKQ7\",\"forum\":\"lRVhXYoKQ7\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission37/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission37/Authors\"],\"number\":37,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission37/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740397164845,\"cdate\":1740397164845,\"tmdate\":1744172570081,\"mdate\":1744172570081,\"pdate\":1741248196922,\"odate\":1741248196922},{\"content\":{\"title\":{\"value\":\"PRISM:
        Enhancing Protein Inverse Folding through Fine-Grained Retrieval on Structure-Sequence
        Multimodal Representations\"},\"authors\":{\"value\":[\"Sazan Mahbub\",\"Souvik
        Kundu\",\"Eric P. Xing\"]},\"authorids\":{\"value\":[\"~Sazan_Mahbub1\",\"~Souvik_Kundu2\",\"~Eric_Xing1\"]},\"Track\":{\"value\":\"Short
        paper\"},\"keywords\":{\"value\":[\"Retrieval Augmented Generation\",\"Protein
        Inverse Folding\",\"Protein Sequence Design\",\"Multimodal Representation\"]},\"TLDR\":{\"value\":\"We
        present PRISM, a multimodal retrieval-augmented generation framework that
        enhances protein inverse folding by dynamically integrating fine-grained structure-sequence
        multimodal representations from a larger protein database.\"},\"abstract\":{\"value\":\"3D
        structure-conditioned protein sequence generation, also known as protein inverse
        folding, is a key challenge in computational biology. While large language
        models for proteins have made significant strides, they cannot dynamically
        integrate rich multimodal representations from existing datasets, specifically
        the combined information of 3D structure and 1D sequence. Additionally, as
        datasets grow, these models require retraining, leading to inefficiencies.
        In this paper, we introduce PRISM, a novel retrieval-augmented generation
        (RAG) framework that enhances protein sequence design by dynamically incorporating
        fine-grained multimodal representations from a larger set of known structure-sequence
        pairs. Our experiments demonstrate that PRISM significantly outperforms state-of-the-art
        techniques in sequence recovery, emphasizing the advantages of incorporating
        fine-grained, multimodal retrieval-augmented generation in protein design.\"},\"pdf\":{\"value\":\"/pdf/53223dad800dcafdbeceb4ebcef5f2b31d934342.pdf\"},\"Presenter\":{\"value\":\"~Sazan_Mahbub1\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nmahbub2025textbfprism,\\ntitle={\\\\${\\\\textbackslash}textbf\\\\{{PRISM}:\\\\}\\\\$
        Enhancing \\\\${\\\\textbackslash}textbf\\\\{{PR}\\\\}\\\\$otein \\\\${\\\\textbackslash}textbf\\\\{S\\\\}\\\\$equence
