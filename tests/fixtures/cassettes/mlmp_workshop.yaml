        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission36/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission36/Authors\"],\"number\":36,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission36/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740394787593,\"cdate\":1740394787593,\"tmdate\":1744172570055,\"mdate\":1744172570055,\"pdate\":1741248196920,\"odate\":1741248196920},{\"content\":{\"title\":{\"value\":\"Connecting
        Scales: Learning Dynamics for Efficient Ionic Conductivity Predictions with
        Graphs\"},\"authors\":{\"value\":[\"Volha Turchyna\",\"Artem Maevskiy\",\"Alexandra
        Carvalho\",\"Andrey E Ustyuzhanin\"]},\"authorids\":{\"value\":[\"~Volha_Turchyna1\",\"~Artem_Maevskiy1\",\"carvalho@nus.edu.sg\",\"~Andrey_E_Ustyuzhanin1\"]},\"Track\":{\"value\":\"Short
        paper\"},\"keywords\":{\"value\":[\"Solid Electrolytes\",\"Ionic Conductivity\",\"Accelerated
        Material Discovery\",\"Equivariant Graph Neural Networks\"]},\"TLDR\":{\"value\":\"This
        study explores the use of graph neural networks to link micro-scale interactions
        with macro-scale ionic conductivity, highlighting its potential utility for
        solid electrolyte discovery.\"},\"abstract\":{\"value\":\"Multiscale approaches
        are crucial for advancing our understanding of material properties, particularly
        in the search for novel solid electrolytes essential for solid-state batteries.
        Estimating ionic conductivity through traditional molecular dynamics (MD)
        simulations is computationally intensive, requiring significant time to capture
        macro-scale behavior from micro-scale interatomic interactions. This work
        addresses the challenge of connecting micro-scale interatomic potentials with
        macro-scale conductivity measurements. We propose using equivariant graph
        neural networks to develop a faster mapping between these scales, significantly
        enhancing the efficiency of ionic diffusion predictions. This proof-of-concept
        demonstrates the potential to accelerate material discovery for solid electrolytes,
        addressing a critical need in energy storage technology.\"},\"pdf\":{\"value\":\"/pdf/65ec39933f08ed958d15936efceed61b67a3f5b8.pdf\"},\"Presenter\":{\"value\":\"~Volha_Turchyna1\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nturchyna2025connecting,\\ntitle={Connecting
        Scales: Learning Dynamics for Efficient Ionic Conductivity Predictions with
        Graphs},\\nauthor={Volha Turchyna and Artem Maevskiy and Alexandra Carvalho
        and Andrey E Ustyuzhanin},\\nbooktitle={ICLR 2025 Workshop on Machine Learning
        Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=02VgrmjZwd}\\n}\"},\"paperhash\":{\"value\":\"turchyna|connecting_scales_learning_dynamics_for_efficient_ionic_conductivity_predictions_with_graphs\"}},\"id\":\"02VgrmjZwd\",\"forum\":\"02VgrmjZwd\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission35/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission35/Authors\"],\"number\":35,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission35/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740394473442,\"cdate\":1740394473442,\"tmdate\":1744172569847,\"mdate\":1744172569847,\"pdate\":1741248196882,\"odate\":1741248196882},{\"content\":{\"title\":{\"value\":\"Improved
        Sampling of Diffusion Models in Fluid Dynamics with Tweedie's Formula\"},\"authors\":{\"value\":[\"Youssef
        Shehata\",\"Benjamin Holzschuh\",\"Nils Thuerey\"]},\"authorids\":{\"value\":[\"~Youssef_Shehata1\",\"~Benjamin_Holzschuh1\",\"~Nils_Thuerey1\"]},\"Track\":{\"value\":\"New
        scientific result\"},\"keywords\":{\"value\":[\"fluid dynamics\",\"diffusion
        models\"]},\"TLDR\":{\"value\":\"We propose two sampling strategies for diffusion
        models that achieve improved performance for fluid dynamics\"},\"abstract\":{\"value\":\"Denoising
        Diffusion Probabilistic Models (DDPMs), while powerful, require extensive
        sampling due to a high number of function evaluations (NFEs) for accurate
        predictions, hindering their use in long-term spatio-temporal physics predictions.
        \ We address this limitation by introducing two novel sampling strategies:
        1) Truncated Sampling Models, which achieve high-fidelity single/few-step
        sampling by truncating the diffusion process, bridging the gap with deterministic
        methods; and 2) Iterative Refinement, a reformulation of DDPM sampling as
        a few-step refinement process. We demonstrate that both methods significantly
        improve accuracy over DDPMs, DDIMs, and EDMs with NFEs $\\\\leq$ 10 for compressible
        transonic flows over a cylinder and provide stable long-term predictions.\"},\"pdf\":{\"value\":\"/pdf/4f914c3f23c5300e1c5362896baf930f7a2fe3d5.pdf\"},\"Presenter\":{\"value\":\"~Youssef_Shehata1\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nshehata2025improved,\\ntitle={Improved
        Sampling of Diffusion Models in Fluid Dynamics with Tweedie's Formula},\\nauthor={Youssef
        Shehata and Benjamin Holzschuh and Nils Thuerey},\\nbooktitle={ICLR 2025 Workshop
        on Machine Learning Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=WNwRteM7H9}\\n}\"},\"paperhash\":{\"value\":\"shehata|improved_sampling_of_diffusion_models_in_fluid_dynamics_with_tweedies_formula\"}},\"id\":\"WNwRteM7H9\",\"forum\":\"WNwRteM7H9\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission34/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission34/Authors\"],\"number\":34,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission34/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740394088274,\"cdate\":1740394088274,\"tmdate\":1744172569820,\"mdate\":1744172569820,\"pdate\":1741248196822,\"odate\":1741248196822},{\"content\":{\"title\":{\"value\":\"FreeFlow:
        Latent Flow Matching for Free Energy Difference Estimation\"},\"authors\":{\"value\":[\"Ege
        Erdogan\",\"Radoslav Ralev\",\"Mika Rebensburg\",\"C\xE9line Marquet\",\"Leon
        Klein\",\"Hannes Stark\"]},\"authorids\":{\"value\":[\"~Ege_Erdogan1\",\"~Radoslav_Ralev1\",\"~Mika_Rebensburg1\",\"~C\xE9line_Marquet1\",\"~Leon_Klein1\",\"~Hannes_Stark1\"]},\"Track\":{\"value\":\"New
        scientific result\"},\"keywords\":{\"value\":[\"free energy\",\"flow matching\",\"free
        energy perturbation\",\"computational biology\"]},\"TLDR\":{\"value\":\"We
        estimate free energy differences via a neural mapping that is based on flow
        matching between the Boltzmann distributions of two molecular systems with
        different dimensionalities.\"},\"abstract\":{\"value\":\"Estimating free energy
        differences between molecular systems is fundamental for understanding molecular
        interactions and accelerating drug discovery. Current techniques use molecular
        dynamics to sample the Boltzmann distributions of the two systems and of several
        intermediate \\\"alchemical\\\" distributions that interpolate between them.
        From the resulting ensembles, free energy differences can be estimated by
        averaging importance weight analogs for multiple distributions. We replace
        slow alchemical simulations with a fast-to-train flow model bridging two systems.
        After training, we obtain free energy differences by integrating the flow's
        instantaneous change of variables when transporting samples between the two
        distributions. To map between molecular systems with different numbers of
        atoms, we replace the previous solutions of simulating auxiliary \\\"dummy
        atoms\\\" by additionally training two autoencoders that project the systems
        to a same-dimensional latent space in which our flow operates. A generalized
        change of variables formula for trans-dimensional mappings motivates the use
        of autoencoders in our free energy estimation pipeline. We validate our approach
        on pharmaceutically relevant ligands in solvent and results show strong agreement
        with reference values.\"},\"pdf\":{\"value\":\"/pdf/88c59cd1629292f69844db1c7111951c6b53f1dc.pdf\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nerdogan2025freeflow,\\ntitle={FreeFlow:
        Latent Flow Matching for Free Energy Difference Estimation},\\nauthor={Ege
        Erdogan and Radoslav Ralev and Mika Rebensburg and C{\\\\'e}line Marquet and
        Leon Klein and Hannes Stark},\\nbooktitle={ICLR 2025 Workshop on Machine Learning
        Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=VTKPOXKXlx}\\n}\"},\"paperhash\":{\"value\":\"erdogan|freeflow_latent_flow_matching_for_free_energy_difference_estimation\"}},\"id\":\"VTKPOXKXlx\",\"forum\":\"VTKPOXKXlx\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission33/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission33/Authors\"],\"number\":33,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission33/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740390602642,\"cdate\":1740390602642,\"tmdate\":1745400311251,\"mdate\":1745400311251,\"pdate\":1741248196790,\"odate\":1741248196790},{\"content\":{\"title\":{\"value\":\"Symbolic
        Regression for Learning Scale Transition Equations in Synthetic Fractal Surface
        Roughness\"},\"authors\":{\"value\":[\"Aneesh Chatrathi\",\"Zayan Hasan\"]},\"authorids\":{\"value\":[\"~Aneesh_Chatrathi1\",\"~Zayan_Hasan2\"]},\"Track\":{\"value\":\"Short
        paper\"},\"keywords\":{\"value\":[\"Symbolic Regression\",\"Surface Roughness\",\"Fractal
        Geometry\",\"Coarse Graining\",\"Multiscale Modeling\",\"Machine Learning\",\"Uncertainty
        Quantification\"]},\"TLDR\":{\"value\":\"We use symbolic regression to derive
        interpretable scale-transition equations from synthetic fractal surface roughness
        data, enabling accurate and explainable multiscale modeling.\"},\"abstract\":{\"value\":\"Modeling
        surface roughness in materials science is a challenging multiscale problem,
        as surface textures often exhibit hierarchical (fractal-like) structure across
        multiple scales. In this work, we present a synthetic data-driven approach
        to studying scale transitions in surface roughness using fractal data generation
        and symbolic regression. We construct coarse-grained representations of synthetic
        fractal surfaces and apply symbolic regression to derive interpretable mathematical
        expressions that map fine-scale features to coarse-scale behavior. On controlled
        synthetic data, our approach achieves high predictive accuracy (R\xB2 near
        1, low MSE), serving as a baseline validation. While the data is idealized,
        these results suggest that symbolic regression can capture scale-transition
        relationships in hierarchical surface structures and may also be able to support
        future efforts in data-driven multiscale modeling. This work highlights the
        potential of symbolic learning in accelerating modeling workflows for complex
        physical systems.\"},\"pdf\":{\"value\":\"/pdf/2f0616cbe9fc1455c3741c0ae5393f4458122735.pdf\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"Supplementary\":{\"value\":\"https://constructor.app/platform/research/public/project/mlmp-v3mg\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nchatrathi2025symbolic,\\ntitle={Symbolic
        Regression for Learning Scale Transition Equations in Synthetic Fractal Surface
        Roughness},\\nauthor={Aneesh Chatrathi and Zayan Hasan},\\nbooktitle={ICLR
        2025 Workshop on Machine Learning Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=MjhOqgiDju}\\n}\"},\"paperhash\":{\"value\":\"chatrathi|symbolic_regression_for_learning_scale_transition_equations_in_synthetic_fractal_surface_roughness\"}},\"id\":\"MjhOqgiDju\",\"forum\":\"MjhOqgiDju\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission31/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission31/Authors\"],\"number\":31,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission31/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740382492304,\"cdate\":1740382492304,\"tmdate\":1745564013535,\"mdate\":1745564013535,\"pdate\":1741248196774,\"odate\":1741248196774},{\"content\":{\"title\":{\"value\":\"Analysis
        of Neural ODE Performance in Long-term PDE Sequence Modeling\"},\"authors\":{\"value\":[\"Fang
        Sun\",\"Maxwell Dalton\",\"Yizhou Sun\"]},\"authorids\":{\"value\":[\"~Fang_Sun3\",\"~Maxwell_Dalton1\",\"~Yizhou_Sun1\"]},\"Track\":{\"value\":\"Short
        paper\"},\"keywords\":{\"value\":[\"PDE Simulation; Long Timescale Prediction;
        Neural ODE\"]},\"abstract\":{\"value\":\"Predicting solutions to partial differential
        equations (PDEs) from limited snapshots is central to many scientific and
        engineering disciplines. However, standard autoregressive neural models often
        suffer from compounding errors when rolled out over large time scales. In
        this paper, we investigate Neural Ordinary Differential Equations (Neural
        ODEs) as an alternative to purely discrete, stepwise approaches for PDE sequence
        modeling. We propose a continuous-time neural solver architecture that combines
        a graph encoder to process local spatial features, a learned ODE network to
        integrate node embeddings forward in time, and a decoder that produces PDE
        field predictions at future timesteps. We compare this Neural ODE solver to
        a baseline autoregressive GNN on a long-horizon sequence-to-sequence prediction
        task for Burgers' equation without diffusion. Empirical results indicate that
        our Neural ODE approach significantly reduces error growth over extended time
        scale and achieves improved stability. These findings highlight the promise
        of continuous-time neural modeling for robust PDE simulation and pave the
        way for applying learned surrogates to complex scientific systems. Our implementation
        is available at https://github.com/FrancoTSolis/neural-ode-pde.\"},\"pdf\":{\"value\":\"/pdf/db99959e305a8ac69a13b4b178d19543cd88f358.pdf\"},\"Presenter\":{\"value\":\"~Maxwell_Dalton1\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nsun2025analysis,\\ntitle={Analysis
        of Neural {ODE} Performance in Long-term {PDE} Sequence Modeling},\\nauthor={Fang
        Sun and Maxwell Dalton and Yizhou Sun},\\nbooktitle={ICLR 2025 Workshop on
        Machine Learning Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=rnxAKI2kRD}\\n}\"},\"paperhash\":{\"value\":\"sun|analysis_of_neural_ode_performance_in_longterm_pde_sequence_modeling\"}},\"id\":\"rnxAKI2kRD\",\"forum\":\"rnxAKI2kRD\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission30/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission30/Authors\"],\"number\":30,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission30/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740371215019,\"cdate\":1740371215019,\"tmdate\":1744172569407,\"mdate\":1744172569407,\"pdate\":1741248196691,\"odate\":1741248196691},{\"content\":{\"title\":{\"value\":\"Multi-Scale
        Modeling of Financial Systems Using Neural Differential Equations: Applications
        to High-Frequency Trading, Regime Switching, and Portfolio Optimization\"},\"authors\":{\"value\":[\"Tao
        Qiu\"]},\"authorids\":{\"value\":[\"~Tao_Qiu1\"]},\"Track\":{\"value\":\"New
        scientific result\"},\"keywords\":{\"value\":[\"Neural Differential Equations\",\"Multi-Scale
        Modeling\",\"High-Frequency Trading\",\"Regime Switching. Portfolio Optimization\"]},\"TLDR\":{\"value\":\"This
        paper proposes a neural differential equation (NDE) framework for multi-scale
        financial modeling, excelling in high-frequency trading, regime switching,
        and portfolio optimization over traditional methods.\"},\"abstract\":{\"value\":\"This
        paper explores the application of neural differential equations (NDEs) to
        model the multi-scale dynamics of financial systems, with a focus on high-frequency
        trading, regime-switching asset prices, and portfolio optimization. We propose
        a novel framework that integrates stochastic volatility and hierarchical architectures
        to capture both short-term fluctuations and long-term trends. e demonstrate
        the effectiveness of NDEs in predicting prices, identifying regime transitions,
        and optimizing portfolios across multiple time scales. The framework is compared
        with traditional methods such as GARCH and LSTMs, showing superior performance
        in terms of predictive accuracy, computational efficiency, and risk-adjusted
        returns. The results highlight the potential of NDEs for real-time applications
        in financial markets, offering a scalable and interpretable solution for modeling
        complex systems.\"},\"pdf\":{\"value\":\"/pdf/540189a3dc9a649a478b2b54f4a0a931109ec232.pdf\"},\"Presenter\":{\"value\":\"~Tao_Qiu1\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nqiu2025multiscale,\\ntitle={Multi-Scale
        Modeling of Financial Systems Using Neural Differential Equations: Applications
        to High-Frequency Trading, Regime Switching, and Portfolio Optimization},\\nauthor={Tao
        Qiu},\\nbooktitle={ICLR 2025 Workshop on Machine Learning Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=9niAAZES5o}\\n}\"},\"paperhash\":{\"value\":\"qiu|multiscale_modeling_of_financial_systems_using_neural_differential_equations_applications_to_highfrequency_trading_regime_switching_and_portfolio_optimization\"}},\"id\":\"9niAAZES5o\",\"forum\":\"9niAAZES5o\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission29/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission29/Authors\"],\"number\":29,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\",\"ICLR.cc/2025/Workshop/MLMP/Submission29/-/Camera-Ready_Revision\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740371120502,\"cdate\":1740371120502,\"tmdate\":1744172569364,\"mdate\":1744172569364,\"pdate\":1741248196667,\"odate\":1741248196667},{\"content\":{\"title\":{\"value\":\"Leveraging
        LLM-based sentiment analysis for portfolio allocation with proximal policy
        optimization\"},\"authors\":{\"value\":[\"Kemal Kirtac\",\"Guido Germano\"]},\"authorids\":{\"value\":[\"~Kemal_Kirtac1\",\"~Guido_Germano1\"]},\"Track\":{\"value\":\"New
        scientific result\"},\"keywords\":{\"value\":[\"Deep reinforcement learning\",\"stock
        return forecasting\",\"large language models\",\"portfolio allocation\"]},\"abstract\":{\"value\":\"Portfolio
        optimization requires adaptive strategies to maximize returns while managing
        risk. Reinforcement learning (RL) has gained traction in financial decision-making,
        and proximal policy optimization (PPO) has demonstrated strong performance
        in dynamic asset allocation. However, traditional PPO relies solely on historical
        price data, ignoring market sentiment, which plays a crucial role in asset
        movements. We propose a sentiment-augmented PPO (SAPPO) model that integrates
        daily financial news sentiment extracted from Refinitiv using LLaMA 3.3, a
        large language model optimized for financial text analysis. The sentiment
        layer refines portfolio allocation by incorporating real-time market sentiment
        alongside price movements. We evaluate both PPO and SAPPO on a three-stock
        portfolio consisting of Google, Microsoft and Meta, and we compare performance
        against standard market benchmarks. Results show that SAPPO improves risk-adjusted
        returns with a superior Sharpe ratio and reduced drawdowns. Our findings highlight
        the value of integrating sentiment analysis into RL-driven portfolio management.\"},\"pdf\":{\"value\":\"/pdf/ab807e358b9a8a5beda992be4a2fb0804c04b09b.pdf\"},\"venue\":{\"value\":\"ICLR
        2025 Workshop MLMP Poster\"},\"venueid\":{\"value\":\"ICLR.cc/2025/Workshop/MLMP\"},\"_bibtex\":{\"value\":\"@inproceedings{\\nkirtac2025leveraging,\\ntitle={Leveraging
        {LLM}-based sentiment analysis for portfolio allocation with proximal policy
        optimization},\\nauthor={Kemal Kirtac and Guido Germano},\\nbooktitle={ICLR
        2025 Workshop on Machine Learning Multiscale Processes},\\nyear={2025},\\nurl={https://openreview.net/forum?id=n64e2mKzTg}\\n}\"},\"paperhash\":{\"value\":\"kirtac|leveraging_llmbased_sentiment_analysis_for_portfolio_allocation_with_proximal_policy_optimization\"}},\"id\":\"n64e2mKzTg\",\"forum\":\"n64e2mKzTg\",\"license\":\"CC
        BY 4.0\",\"signatures\":[\"ICLR.cc/2025/Workshop/MLMP/Submission28/Authors\"],\"readers\":[\"everyone\"],\"writers\":[\"ICLR.cc/2025/Workshop/MLMP\",\"ICLR.cc/2025/Workshop/MLMP/Submission28/Authors\"],\"number\":28,\"invitations\":[\"ICLR.cc/2025/Workshop/MLMP/-/Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Post_Submission\",\"ICLR.cc/2025/Workshop/MLMP/-/Edit\"],\"domain\":\"ICLR.cc/2025/Workshop/MLMP\",\"tcdate\":1740225858072,\"cdate\":1740225858072,\"tmdate\":1745399569686,\"mdate\":1745399569686,\"pdate\":1741248196609,\"odate\":1741248196609},{\"content\":{\"title\":{\"value\":\"Boosting
        Protein Graph Representations through Static-Dynamic Fusion\"},\"authors\":{\"value\":[\"Pengkang
        Guo\",\"Bruno Correia\",\"Pierre Vandergheynst\",\"Daniel Probst\"]},\"authorids\":{\"value\":[\"~Pengkang_Guo1\",\"~Bruno_Correia1\",\"~Pierre_Vandergheynst1\",\"~Daniel_Probst3\"]},\"Track\":{\"value\":\"New
        scientific result\"},\"keywords\":{\"value\":[\"Graph Neural Networks\",\"Protein
        Modeling\",\"Molecular Dynamics\",\"Heterogeneous Graph\"]},\"abstract\":{\"value\":\"Machine
        learning for protein modeling faces significant challenges due to proteins'
        inherently dynamic nature, yet most graph-based machine learning methods rely
        solely on static structural information. Recently, the growing availability
        of molecular dynamics trajectories provides new opportunities for understanding
        the dynamic behavior of proteins; however, computational methods for utilizing
        this dynamic information remain limited. We propose a novel graph representation
        that integrates both static structural information and dynamic correlations
        from molecular dynamics trajectories, enabling more comprehensive modeling
        of proteins. By applying relational graph neural networks (RGNNs) to process
        this heterogeneous representation, we demonstrate significant improvements
        over structure-based approaches across three distinct tasks: atomic adaptability
        prediction, binding site detection, and binding affinity prediction. Our results
        validate that combining static and dynamic information provides complementary
        signals for understanding protein-ligand interactions, offering new possibilities
        for drug design and structural biology applications.\"},\"pdf\":{\"value\":\"/pdf/c0a24e416bc09e9ab819e2ccaa4e65f271831b91.pdf\"},\"Presenter\":{\"value\":\"~Pengkang_Guo1\"},\"venue\":{\"value\":\"ICLR
